
\subsection{Model Testing}

The best-performing model configuration for each prediction target will be selected
based on cross-validation Recall scores and evaluated on the held-out 20\% test
set. Five standard evaluation metrics will be computed for each model:

\begin{itemize}
    \item \textbf{Accuracy:} The proportion of correct predictions (both at-risk
    and not-at-risk) relative to total test observations.

    \item \textbf{Precision:} The proportion of students predicted as at-risk
    who are genuinely at-risk, minimising the misallocation of scarce
    counselling resources to students who do not require intervention.

    \item \textbf{Recall (Sensitivity):} The proportion of genuinely at-risk
    students correctly identified by the model. 

    \item \textbf{F1-Score:} The harmonic mean of Precision and Recall,
    providing a single balanced metric that accounts simultaneously for
    false negatives and false positives.

    \item \textbf{ROC-AUC:} The area under the Receiver Operating
    Characteristic curve, providing a threshold-independent measure of
    each model's discriminative ability across all classification thresholds.
    
\end{itemize}



\begin{itemize}
    \item \textbf{Data anonymisation:} All student records were de-identified
    prior to extraction by replacing personally identifiable information with
    pseudonymous identifiers. No data capable of re-identifying individual
    students was retained in the analytical dataset.

    \item \textbf{Informed consent:} Participants in the system evaluation
    phase provided written informed consent prior to participation, with the
    right to withdraw at any time without consequence.

    \item \textbf{Data minimisation:} Only the data fields strictly necessary
    for the research objectives were extracted, consistent with the data
    minimisation principle of the Kenya Data Protection Act \parencite{kenya2019dataprotection}.

    \item \textbf{Access controls:} The extracted dataset will be stored in a
    password-protected, encrypted repository accessible only to the researcher
    and supervising faculty.

    \item \textbf{Human-in-the-loop deployment:} This softeware will be designed
    as a decision-support tool that augments rather than replaces professional
    advisor judgment. All risk classifications will be presented as
    evidence-based recommendations, not autonomous verdicts, preserving the
    advisor's role as the responsible decision-making agent \parencite{kwakye2025}.

    \item \textbf{Fairness and bias audit:} The trained models will be assessed
    for differential prediction performance across student subgroups defined
    by school of enrolment and year of study, ensuring that the tool does not 
    systematically disadvantage any student subgroup through biased
    risk classifications \parencite{bello2025developing, kwakye2025}.
    Results of the fairness audit will be reported in Chapter Four.
\end{itemize}
